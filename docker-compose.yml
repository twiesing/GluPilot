services:
  be-berater:
    image: ghcr.io/twiesing/glupilot:latest
    restart: unless-stopped
    # Secrets (OPENAI_API_KEY, DEXCOM_*, API_TOKEN, Korrekturwerte) aus .env
    env_file: .env
    environment:
      - TZ=Europe/Berlin
      - CADDY_DOMAIN=be-berater.example.com
      - CADDY_WWW_REDIRECT=false
      - CADDY_TYPE=external
      - CADDY_PORT=8080
      - CADDY_SEO=true
      # App lauscht auf dem von Caddy erwarteten Port.
      - PORT=8080
      - HOST=0.0.0.0
    networks:
      caddy:

networks:
  caddy:
    external: true
